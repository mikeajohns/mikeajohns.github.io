<!DOCTYPE html>
<html><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link rel="stylesheet" content="text/css" href="web/static/89bhzpuc_weather.css">
<script src="web/static/89bhzpuc_search.js"></script>
<script src="web/static/89bhzpuc_states.js"></script>
<script src="web/static/89bhzpuc_charts.js"></script>
<script src="web/static/jquery-3.5.1.min.js"></script>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/highcharts-more.js"></script><!--for area range-->
<script src="https://code.highcharts.com/modules/windbarb.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>

<title>Cool Weather Search</title>
</head>
<body onload="onLoad()"> 

<div class="card-holder"><div id="weather-form" class="form card">
    <div class="header-bar">
        <div id="header-bar-texts">
            <div id="weather-search" class="title">Weather Search</div>
            <div id="fill-out-form">Fill out the form to get weather info !</div>
        </div>
    </div>
    <form id="search-form">
    <div id="address-info">
    <table id="address-table">
        
        <tr><th colspan=2><label for="street">Street<span class="required">*</span></label></th></tr>
        <tr><th colspan=2><input type="text" id="street" required /></th></tr>
        
        <tr>
            <th class="width-auto-2"><label for="city">City<span class="required">*</span></label></th>
            <th class="width-auto-2"><label for="state">State<span class="required">*</span></label></th>
        </tr>
        <tr>
            <th id="city-cell" class="width-auto-2"><input type="text" id="city" required /></th>
            <th id="state-cell" class="width-auto-2"><select id="state" required></select></th>
        </tr>
        <tr>
            <th colspan="2"><hr id="horiz-rule"></th>
        </tr>
    </table>
    </div>
    <div id="auto-detect">
        <label for="auto-detect-cb">Want us to auto-detect your location? Check here </label><input type="checkbox" onchange="onCheckboxChange()" id="auto-detect-cb" />
    </div>
    <div>
        <button type="submit" class="submit button">SUBMIT</button>
        <button type="button" onclick="clearForm()" class="clear-button button">CLEAR</button>
    </div>
    </form>
</div></div>

<div class="card-holder"><div id="no-records-card" class="default-hide card">
No records have been found.
</div></div>

<div class="card-holder default-hide" id="current-weather"><div id="current-weather-card" class="card hover-shadow">
    <div id="location"></div>
    <table id="current-summary">
        <tr id="current-big-picture-row">
            <th>
                <div id="current-weather-code-stuff">
                    <img id="weather-code-icon" alt="Weather Code"><br/>
                    <div id="weather-code-text"></div>
                </div>
            </th>
            <th id="current-temp-th"><div id="current-temp"></div></th>
        </tr>
    </table>
    <table id="current-details">
        <tr id="current-details-header">
            <th>Humidity</th>
            <th>Pressure</th>
            <th>Wind Speed</th>
            <th>Visibility</th>
            <th>Cloud Cover</th>
            <th>UV Level</th>
        </tr>
        <tr id="current-details-icons">
            <th><img id="humidity-icon" alt="Humidity" class="current-weather-stat-type-icon"></th>
            <th><img id="pressure-icon" alt="Pressure" class="current-weather-stat-type-icon"></th>
            <th><img id="wind-speed-icon" alt="Wind Speed" class="current-weather-stat-type-icon"></th>
            <th><img id="visibility-icon" alt="Visibility" class="current-weather-stat-type-icon"></th>
            <th><img id="cloud-cover-icon" alt="Cloud Cover" class="current-weather-stat-type-icon"></th>
            <th><img id="uv-level-icon" alt="UV Level" class="current-weather-stat-type-icon"></th>
        </tr>
        <tr id="current-details-values">
            <th id="humidity-value"></th>
            <th id="pressure-value"></th>
            <th id="wind-speed-value"></th>
            <th id="visibility-value"></th>
            <th id="cloud-cover-value"></th>
            <th id="uv-level-value"></th>
        </tr>
    </table>
</div></div>
<div class="card-holder default-hide" id="forecast"><div id="x-day-forecast-card" class="card">
    <table id="x-day-forecast">
    </table>
</div></div>
<div class="card-holder default-hide" id="daily-weather-details">
    <div class="card-header">Daily Weather Details</div>
    <div id="daily-weather-details-card" class="card hover-shadow">
        <div id="daily-info">
            <div id="daily-day"></div>
            <div id="daily-weather-code-text"></div>
            <div id="daily-hi-low-temp"></div>
        </div>
        <div id="daily-icon-div">
            <img id="daily-weather-code-icon" alt="Daily Weather Conditions">
        </div>
        <table id="daily-weather-details-table"></table>
    </div>
</div>
<div class="card-holder default-hide" id="weather-charts">
    <div class="card-header">Weather Charts</div>
    <input type="image" id="up-button" alt="Hide Weather Charts" class="arrow-button" onclick="hideWeatherCharts()" src="web/images/point-up-512.png" />
    <div id="weather-charts-card">
        <div id="days-chart"></div>
        <div id="hours-chart"></div>
    </div>
    <div>
        <input type="image" id="down-button" alt="Show Weather Charts" class="arrow-button default-show" onclick="showWeatherCharts()" src="web/images/point-down-512.png" />
    </div>
</div>

</body></html>
