<!DOCTYPE html>
<html><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link rel="stylesheet" content="text/css" href="web/static/weather.css">
<script src="web/static/search.js"></script>
<script src="web/static/states.js"></script>
<script src="web/static/jquery-3.5.1.min.js"></script>
<title>TODO</title>
</head>
<body onload="onLoad()"> 

<div class="card-holder"><div id="weather-form" class="form card">
    <div class="header-bar">
        <div class="title">Weather Search</div>
        <div>Fill out the form to get weather info!</div>
    </div>
    <form>
    <div class="address-info">
    <table>
        
        <tr><th colspan=2><label for="street">Street<span class="required">*</span></label></th></tr>
        <tr><th colspan=2><input type="text" id="street"></input></th></tr>
        
        <tr>
            <th class="width-auto-2"><label for="city">City<span class="required">*</span></label></th>
            <th class="width-auto-2"><label for="state">State<span class="required">*</span></label></th>
        </tr>
        <tr>
            <th class="width-auto-2"><input type="text" id="city"></input></th>
            <th class="width-auto-2"><select id="state"></select></th>
        </tr>
    </table>
    </div>
    <hr>
    <div class="auto-detect">
        <label for="auto-detect">Want us to auto-detect your location? Check here </label><input type="checkbox" onchange="onCheckboxChange()" id="auto-detect"></input>
    </div>
    <div>
        <button type="button" onclick="submitForm()" class="submit button">SUBMIT</button>
        <button type="button" onclick="clearForm()" class="clear-button button">CLEAR</button>
    </div>
    </form>
</div></div>
<div class="card-holder default-hide" id="current-weather"><div class="card">
    <div id="location"></div>
    <table id="current-summary">
        <tr id="current-big-picture-row">
            <th><img id="weather-code-icon"></th>
            <th id="current-temp"></th>
        </tr>
    </table>
    <table id="current-details">
        <tr id="current-details-header">
            <th>Humidity</th>
            <th>Pressure</th>
            <th>Wind Speed</th>
            <th>Visibility</th>
            <th>Cloud Cover</th>
            <th>UV Level</th>
        </tr>
        <tr id="current-details-icons">
            <th><img id="humidity-icon"></th>
            <th><img id="pressure-icon"></th>
            <th><img id="wind-speed-icon"></th>
            <th><img id="visibility-icon"></th>
            <th><img id="cloud-cover-icon"></th>
            <th><img id="uv-level-icon"></th>
        </tr>
        <tr id="current-details-values">
            <th id="humidity-value"></th>
            <th id="pressure-value"></th><!--TODO finish-->
            <th id="wind-speed-value"></th>
            <th id="visibility-value"></th>
            <th id="cloud-cover-value"></th>
            <th id="uv-level-value"></th>
        </tr>
    </table>
</div></div>
<div class="card-holder default-hide" id="forecast"><div class="card">
    <table id="x-day-forecast">
    <tr class="forecast-table-header">
        <th>Date</th><th>Status</th><th>Temp High</th><th>Temp Low</th><th>Wind Speed</th>
    </tr>
    </table>
</div></div>
<div class="card-holder default-hide" id="daily-weather-details">
    <div>Daily Weather Details</div>
    <div class="card">
        Daily Details
    </div>
</div>
<div class="card-holder default-hide" id="weather-charts">
    <div>Weather Charts</div>
    <div id="weather-charts-card" class="card">
        <div>
            <input type="image" id="up-button" class="arrow-button" onclick="hideWeatherCharts()" src="web/images/point-up-512.png" />
        </div>
        Charts
    </div>
    <div>
        <input type="image" id="down-button" class="arrow-button" onclick="showWeatherCharts()" src="web/images/point-down-512.png" />

    </div>
    
</div>

</body></html>
