<!DOCTYPE html>
<html><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link rel="stylesheet" content="text/css" href="sf8fh85s_entertainment.css">
<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
<script src="jquery-3.5.1.min.js"></script>
<script src="sf8fh85s_search.js"></script>
<script src="js/bootstrap.min.js"></script>

<title>MyApp</title>
</head>
<body onload="onLoad()"> 

<div class="card-holder"><div id="weather-form" class="form card">
    <div class="header-bar">
        Entertainment Event Ticket Search
    </div>
    <form id="search-form">
    <table id="address-table">
        <!--TODO need to autocomplete -- it's a call from Ticketmaster-->
        <tr><td><label for="keyword">Keyword<span class="required">*</span></label></td><td><input type="text" id="keyword" placeholder="Event Artist, Team or Event Name (eg. Lakers)" required></input></td></tr>
        <tr><td><label for="category">Category</label></td><td><input type="text" id="category" value="All"></input></td></tr>
        <tr><td><label for="distance">Distance</label></td><td><input type="text" id="distance" placeholder="10"></input><input type="text" id="distance-units" value="miles"></input></td></tr>
        <tr><td><label for="source">From<span class="required">*</span></label></td><td>
            <input type="radio" name="source" onchange="onLocationTypeChange()" id="current-location" checked></input><label for="current-location">Current location</label><br>
            <input type="radio" name="source" onchange="onLocationTypeChange()" id="other-source" required></input><label for="other-source">Other. Please specify:</label><br>
            <input type="text" id="other-location" required></input>
        </td></tr>
    </table>
    <div>
        <button type="submit" class="submit button">Search</button>
        <button type="button" onclick="clearSearch()" class="clear-button button">Clear</button>
    </div>
    </form>
</div></div>
<div class="center">
    <button type="button" class="button">Results</button>
    <button type="button" class="button">Favorites</button>
</div>
<div id="results" class="default-hide">RESULTS TODO</div>
<div id="favorites" class="default-hide">FAVES TODO</div>

</body></html>
