<!DOCTYPE html>
<html><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link rel="stylesheet" content="text/css" href="sf8fh85s_entertainment.css">
<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
<script src="jquery-3.5.1.min.js"></script>
<script src="sf8fh85s_search.js"></script>
<script src="js/bootstrap.min.js"></script>

<title>MyApp</title>
</head>
<body onload="onLoad()"> 


<div class="header-bar">
    Entertainment Event Ticket Search
</div>
<form id="search-form">
<div class="row">
    <!--TODO need to autocomplete -- it's a call from Ticketmaster-->
    <div class="col-md-2"><label for="keyword">Keyword<span class="required">*</span></label></div>
    <div class="col-md-5"><input type="text" id="keyword" placeholder="Event Artist, Team or Event Name (eg. Lakers)" required></input></div>
</div>
<div class="row">
    <div class="col-md-2"><label for="category">Category</label></div>
    <div class="col-md-2">
        <select id="category">
            <option value="All" selected>All</option>
            <option value="Music">Music</option>
            <option value="Sports">Sports</option>
            <option value="Arts & Theatre">Arts & Theatre</option>
            <option value="Film">Film</option>
            <option value="Miscellaneous">Miscellaneous</option>
        </select>
    </div>
</div>
<div class="row">
    <div class="col-md-2"><label for="distance">Distance</label></div>
    <div class="col-md-2"><input type="text" id="distance" placeholder="10"></input></div>
    <div class="col-md-2">
        <select id="distance-units">
            <option value="miles" selected>miles</option>
            <option value="kilometers">kilometers</option>
        </select>
    </div>
</div>
<div class="row">
    <div class="col-md-2"><label for="source">From<span class="required">*</span></label></div>
    <div class="col-md-5">
        <input type="radio" name="source" onchange="onLocationTypeChange()" id="current-location" checked></input><label for="current-location">Current location</label><br>
        <input type="radio" name="source" onchange="onLocationTypeChange()" id="other-source" required></input><label for="other-source">Other. Please specify:</label><br>
        <input type="text" id="other-location" required></input>
    </div>
</div>            
<div>
    <button type="submit" class="submit button">Search</button>
    <button type="button" onclick="clearSearch()" class="clear-button button">Clear</button>
</div>
</form>

</body></html>
